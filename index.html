

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kohei Fujikura</title>
  <meta name="description" content="Kohei Fujikura">
  <style>
    :root {
      --bg: #f5f7fb;
      --bg-alt: #eef2f9;
      --surface: #ffffff;
      --text: #1b2430;
      --muted: #5f6b7a;
      --line: #d8dee9;
      --accent: #1f4fd1;
      --accent-soft: #e8eeff;
      --max-width: 980px;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(20, 30, 50, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.75;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: min(var(--max-width), calc(100% - 40px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      background: rgba(245, 247, 251, 0.86);
      border-bottom: 1px solid rgba(216, 222, 233, 0.8);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 72px;
      gap: 20px;
    }

    .logo {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
    }

    .logo:hover {
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .hero {
      padding: 100px 0 70px;
      background:
        radial-gradient(circle at top left, rgba(31, 79, 209, 0.08), transparent 35%),
        linear-gradient(to bottom, #f8faff, #f5f7fb);
    }

    .hero-inner {
      max-width: 760px;
    }

    .eyebrow {
      display: inline-block;
      margin: 0 0 14px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .hero h1 {
      margin: 0 0 18px;
      font-size: clamp(2.6rem, 6vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero-text {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1.14rem;
      max-width: 680px;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      box-shadow: var(--shadow);
    }

    .button:hover {
      text-decoration: none;
      transform: translateY(-1px);
    }

    .button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .section {
      padding: 72px 0;
    }

    .section.alt {
      background: var(--bg-alt);
    }

    .section-heading {
      margin-bottom: 24px;
    }

    .section-label {
      margin: 0 0 6px;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .section h2 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.15;
    }

    .grid.two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 26px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.18rem;
    }

    .card p:last-child,
    .card li:last-child {
      margin-bottom: 0;
    }

    .pub-list {
      margin: 0;
      padding-left: 1.3rem;
    }

    .pub-list li + li {
      margin-top: 18px;
    }

    .pub-links {
      display: inline-flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .link-list {
      margin: 0;
      padding-left: 1.2rem;
    }

    .site-footer {
      padding: 28px 0 50px;
      border-top: 1px solid var(--line);
      background: var(--bg);
    }

    .footer-inner {
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 720px) {
      .nav {
        padding: 12px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .grid.two {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 80px 0 56px;
      }

      .card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="#" class="logo">Kohei Fujikura</a>
      <nav class="nav-links">
        <a href="#about">Home</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <h1>Kohei Fujikura</h1>
        <p class="hero-text">
          Postdoctoral researcher at Yukawa Institute for Theoretical Physics, <span style="white-space: nowrap;">Kyoto University.</span>
        </p>
        <div class="hero-buttons">
          <a class="button primary" href="#about">About Me</a>
        </div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container">
        <div class="section-heading">
          <p class="section-label">Home</p>
          <h2>About</h2>
        </div>
        <div class="card">
          <p>
            Welcome to my homepage!
          </p>
          <p>
            Email:
            <a href="mailto:supersaiyajinkohei@gmail.com">
              supersaiyajinkohei@gmail.com
            </a>
          </p>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© Kohei Fujikura</p>
    </div>
  </footer>
</body>
</html>
